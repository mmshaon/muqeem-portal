<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="theme-color" content="#8B0000">
    <meta name="description" content="Muqeem AI Report – Saudi Residency Document Generator">
    <link rel="manifest" href="data:application/manifest+json,{
        %22name%22:%22Muqeem%20AI%20Report%22,
        %22short_name%22:%22Muqeem%22,
        %22start_url%22:%22/%22,
        %22display%22:%22standalone%22,
        %22background_color%22:%22%23ffffff%22,
        %22theme_color%22:%22%238B0000%22,
        %22icons%22:[
            {%22src%22:%22data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect fill='%238B0000' width='192' height='192'/%3E%3Ctext x='50%25' y='50%25' dominant-baseline='middle' text-anchor='middle' font-size='120' font-weight='bold' fill='white' font-family='Arial'%3EM%3C/text%3E%3C/svg%3E%22,%22sizes%22:%22192x192%22,%22type%22:%22image/svg+xml%22%7D,
            {%22src%22:%22data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect fill='%238B0000' width='512' height='512'/%3E%3Ctext x='50%25' y='50%25' dominant-baseline='middle' text-anchor='middle' font-size='320' font-weight='bold' fill='white' font-family='Arial'%3EM%3C/text%3E%3C/svg%3E%22,%22sizes%22:%22512x512%22,%22type%22:%22image/svg+xml%22%7D
        ]
    }">
    <title>Muqeem AI Report | مقيم</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        @media print { body { background: #eff3f7; } .no-print { display: none !important; } }
        .a4-container { width: 210mm; min-height: 297mm; background: #eff3f7; margin: 0 auto; padding: 10mm; position: relative; }
        @media (max-width: 768px) { .a4-container { width: 100%; padding: 12px; } }
        .arabic { font-family: 'Cairo', sans-serif; direction: rtl; }
        .watermark { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; font-size: 80px; font-weight: 900; color: rgba(220,38,38,0.15); transform: rotate(-35deg); }
        .toast { position: fixed; bottom: 20px; left: 20px; right: 20px; background: #1f2937; color: white; padding: 12px; border-radius: 12px; text-align: center; z-index: 1000; animation: fadeInUp 0.3s; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .loading-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 2000; flex-direction: column; color: white; }
        .spinner { width: 40px; height: 40px; border: 4px solid #e5e7eb; border-top-color: #d97018; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-900 font-sans">
<div id="app" class="min-h-screen"></div>
<script type="module">
    // ---- CONFIGURATION (injected by setup script) ----
    const FIREBASE_CONFIG = {
        apiKey: "AIzaSyBGlL2ZRTBG4jfTxnRNEyZdapFf9ZfKpLs",
        authDomain: "muqeem-portal.firebaseapp.com",
        projectId: "muqeem-portal",
        storageBucket: "muqeem-portal.firebasestorage.app",
        messagingSenderId: "240681803606",
        appId: "1:240681803606:web:8864546852b363a81400f7"
    };
    const CLOUDINARY_CLOUD_NAME = "yusracmd";
    const CLOUDINARY_UPLOAD_PRESET = "";
    const GEMINI_API_KEY = "AIzaSyCnHrVSP9_hXr2YxiFW5-cYPUBUzIemkq0";
    // ----------------------------------------------------

    // Firebase imports
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // App state
    let currentUser = null;
    let viewMode = "form";
    let reportData = {
        id: "", ref: "REF" + Math.floor(Math.random() * 1e10),
        issue: new Date().toISOString().slice(0,10),
        expiry: new Date(Date.now() + 90*86400000).toISOString().slice(0,10),
        nameEn: "", nameAr: "", iqama: "", passport: "", job: "", nationality: "",
        dob: "", employer: "", employerId: "", status: "Active",
        photoUrl: "", passportIssueDate: "", passportExpiryDate: ""
    };

    function showToast(msg, type="info") {
        const toast = document.createElement("div");
        toast.className = `toast ${type === "error" ? "bg-red-600" : type === "success" ? "bg-green-600" : "bg-blue-600"}`;
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    let loadingOverlay = null;
    function setLoading(show, text = "Processing...") {
        if (show) {
            if (loadingOverlay) loadingOverlay.remove();
            loadingOverlay = document.createElement("div");
            loadingOverlay.className = "loading-overlay";
            loadingOverlay.innerHTML = `<div class="spinner mb-4"></div><div>${text}</div>`;
            document.body.appendChild(loadingOverlay);
        } else if (loadingOverlay) {
            loadingOverlay.remove();
            loadingOverlay = null;
        }
    }

    async function uploadToCloudinary(file) {
        const formData = new FormData();
        formData.append("file", file);
        formData.append("upload_preset", CLOUDINARY_UPLOAD_PRESET);
        const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/image/upload`, { method: "POST", body: formData });
        const json = await res.json();
        if (!json.secure_url) throw new Error("Cloudinary upload failed");
        return json.secure_url;
    }

    async function extractWithGemini(files) {
        setLoading(true, "AI analyzing documents...");
        try {
            const images = await Promise.all(Array.from(files).map(file => new Promise(resolve => {
                const reader = new FileReader();
                reader.onloadend = () => resolve({ mimeType: file.type, data: reader.result.split(",")[1] });
                reader.readAsDataURL(file);
            })));
            const prompt = `Extract JSON from Saudi documents: nameEn, nameAr, iqama, passport, nationality, job, dob, employer, employerId, passportIssueDate, passportExpiryDate. Return ONLY JSON.`;
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                method: "POST", headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }, ...images.map(img => ({ inlineData: { mimeType: img.mimeType, data: img.data } }))] }] })
            });
            const result = await response.json();
            const raw = result.candidates[0].content.parts[0].text;
            const jsonMatch = raw.match(/\{[\s\S]*\}/);
            if (!jsonMatch) throw new Error("Invalid AI response");
            const extracted = JSON.parse(jsonMatch[0]);
            Object.assign(reportData, extracted);
            renderForm();
            showToast("AI extraction completed!", "success");
        } catch (err) {
            showToast("AI failed: " + err.message, "error");
        } finally { setLoading(false); }
    }

    async function saveReport() {
        setLoading(true, "Saving to cloud...");
        try {
            const id = "MQ-" + Date.now();
            const finalData = { ...reportData, id, timestamp: Date.now() };
            await setDoc(doc(db, "muqeem_reports", id), finalData);
            const url = new URL(window.location);
            url.searchParams.set("view", id);
            window.history.pushState({}, "", url);
            viewMode = "report";
            renderReport();
            showToast("Report saved! Link ready.", "success");
        } catch (e) { showToast("Save failed: " + e.message, "error"); }
        finally { setLoading(false); }
    }

    async function loadReportFromId(id) {
        setLoading(true, "Loading secure report...");
        try {
            const snap = await getDoc(doc(db, "muqeem_reports", id));
            if (snap.exists()) {
                reportData = snap.data();
                viewMode = "viewer";
                renderReport();
            } else { showToast("Report not found", "error"); viewMode = "form"; renderForm(); }
        } catch(e) { showToast("Error loading", "error"); viewMode = "form"; renderForm(); }
        finally { setLoading(false); }
    }

    async function handlePhotoUpload(file) {
        if (!file) return;
        setLoading(true, "Uploading photo...");
        try {
            const url = await uploadToCloudinary(file);
            reportData.photoUrl = url;
            renderForm();
            showToast("Photo uploaded", "success");
        } catch(e) { showToast("Upload failed", "error"); }
        finally { setLoading(false); }
    }

    function renderForm() {
        const html = `
            <div class="max-w-2xl mx-auto p-4 pb-28">
                <div class="bg-black rounded-2xl p-6 mb-6 text-white"><h1 class="text-3xl font-black">MUQEEM <span class="text-orange-500">PRO AI</span></h1><p class="text-xs">Secure Cloud Report | PWA v6</p></div>
                <div class="bg-white rounded-2xl p-5 mb-5 shadow">
                    <label class="font-bold">📷 Profile Photo</label>
                    <div class="flex gap-4 mt-2"><div class="w-24 h-28 border-2 border-dashed border-orange-300 rounded-lg overflow-hidden bg-gray-50">${reportData.photoUrl ? `<img src="${reportData.photoUrl}" class="w-full h-full object-cover">` : '<div class="w-full h-full flex items-center justify-center text-gray-400 text-xs">No photo</div>'}</div><input type="file" accept="image/*" id="photoInput" class="text-sm"></div>
                </div>
                <div class="bg-white rounded-2xl p-5 mb-5 shadow">
                    <label class="font-bold">🤖 AI Multi-Document Scan</label>
                    <input type="file" multiple accept="image/*" id="aiFiles" class="w-full text-sm mt-1">
                </div>
                <div class="bg-white rounded-2xl p-5 shadow space-y-3">
                    <input type="text" placeholder="Name (English)" id="nameEn" value="${escapeHtml(reportData.nameEn)}" class="w-full border rounded-xl p-3">
                    <input type="text" placeholder="الاسم (Arabic)" id="nameAr" value="${escapeHtml(reportData.nameAr)}" class="w-full border rounded-xl p-3 arabic">
                    <div class="grid grid-cols-2 gap-3"><input type="text" placeholder="Iqama" id="iqama" value="${escapeHtml(reportData.iqama)}" class="border rounded-xl p-3"><input type="text" placeholder="Passport" id="passport" value="${escapeHtml(reportData.passport)}" class="border rounded-xl p-3"></div>
                    <input type="text" placeholder="Nationality" id="nationality" value="${escapeHtml(reportData.nationality)}" class="border rounded-xl p-3">
                    <input type="text" placeholder="Occupation (Arabic)" id="job" value="${escapeHtml(reportData.job)}" class="border rounded-xl p-3 arabic">
                    <input type="text" placeholder="Employer Name" id="employer" value="${escapeHtml(reportData.employer)}" class="border rounded-xl p-3">
                    <input type="text" placeholder="Employer ID" id="employerId" value="${escapeHtml(reportData.employerId)}" class="border rounded-xl p-3">
                    <input type="date" placeholder="DOB" id="dob" value="${reportData.dob}" class="border rounded-xl p-3">
                    <select id="status" class="border rounded-xl p-3"><option value="Active" ${reportData.status==="Active"?"selected":""}>Active / ساري</option><option value="Inactive" ${reportData.status==="Inactive"?"selected":""}>Inactive / غير ساري</option></select>
                </div>
                <button id="saveBtn" class="fixed bottom-4 left-4 right-4 bg-black text-orange-500 font-bold py-4 rounded-2xl shadow-xl">🔒 Generate Secure Report</button>
            </div>
        `;
        document.getElementById("app").innerHTML = html;
        document.getElementById("photoInput")?.addEventListener("change", e => handlePhotoUpload(e.target.files[0]));
        document.getElementById("aiFiles")?.addEventListener("change", e => extractWithGemini(e.target.files));
        document.getElementById("saveBtn")?.addEventListener("click", () => {
            reportData.nameEn = document.getElementById("nameEn").value;
            reportData.nameAr = document.getElementById("nameAr").value;
            reportData.iqama = document.getElementById("iqama").value;
            reportData.passport = document.getElementById("passport").value;
            reportData.nationality = document.getElementById("nationality").value;
            reportData.job = document.getElementById("job").value;
            reportData.employer = document.getElementById("employer").value;
            reportData.employerId = document.getElementById("employerId").value;
            reportData.dob = document.getElementById("dob").value;
            reportData.status = document.getElementById("status").value;
            saveReport();
        });
    }

    function renderReport() {
        const isViewer = viewMode === "viewer";
        const qrValue = `${window.location.origin}${window.location.pathname}?view=${reportData.id}`;
        const html = `
            <div class="${isViewer ? "bg-black" : "bg-gray-100"} min-h-screen p-4">
                ${!isViewer ? `<div class="max-w-[210mm] mx-auto mb-4 flex gap-3 no-print"><button id="backBtn" class="bg-gray-700 text-white px-5 py-2 rounded-full">← Back</button><button id="downloadPdfBtn" class="bg-orange-600 text-white px-5 py-2 rounded-full shadow">📥 PDF</button><button onclick="window.print()" class="bg-blue-600 text-white px-5 py-2 rounded-full">🖨️ Print</button></div>` : ""}
                <div id="a4Container" class="a4-container relative">
                    ${reportData.status === "Inactive" ? '<div class="watermark">INACTIVE</div>' : ''}
                    <div class="flex justify-between items-start mb-6">
                        <div class="w-[100px] h-[130px] border bg-white overflow-hidden">${reportData.photoUrl ? `<img src="${reportData.photoUrl}" class="w-full h-full object-cover">` : '<div class="w-full h-full bg-gray-200"></div>'}</div>
                        <div class="text-center"><div class="text-[#8B0000] text-4xl font-bold arabic">مقيم</div><div class="text-[#8B0000] text-2xl font-bold">Muqeem</div><div class="flex gap-4 justify-center mt-1 text-sm font-bold"><span>Muqeem Report</span><span class="arabic">تقرير مقيم</span></div></div>
                        <div class="flex flex-col items-end gap-2"><img src="https://upload.wikimedia.org/wikipedia/commons/thumb/0/0d/Emblem_of_Saudi_Arabia.svg/80px-Emblem_of_Saudi_Arabia.svg.png" class="w-12 h-12"><img src="https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=${encodeURIComponent(qrValue)}" class="w-16 h-16 border"></div>
                    </div>
                    <div class="flex justify-between border-b-2 border-black pb-2 mb-4 text-xs font-bold"><div>Reference: ${reportData.ref}</div><div>Issue: ${reportData.issue} | Expiry: ${reportData.expiry}</div></div>
                    <div class="grid grid-cols-2 gap-4 text-[10px]">
                        <div class="space-y-3"><div class="border border-black"><div class="bg-[#d97018] px-2 py-1 font-bold flex justify-between"><span>Passport & Visas</span><span class="arabic">معلومات الجواز</span></div><div class="p-2 space-y-1"><div class="flex justify-between"><span class="font-bold">Passport No.</span><span>${reportData.passport||"—"}</span><span class="arabic">رقم الجواز</span></div><div class="flex justify-between"><span class="font-bold">Passport Issue</span><span>${reportData.passportIssueDate||"—"}</span><span class="arabic">تاريخ الإصدار</span></div><div class="flex justify-between"><span class="font-bold">Passport Expiry</span><span>${reportData.passportExpiryDate||"—"}</span><span class="arabic">تاريخ الانتهاء</span></div><div class="flex justify-between"><span class="font-bold">Visa Expiry</span><span>${reportData.expiry||"—"}</span><span class="arabic">انتهاء التأشيرة</span></div></div></div><div class="border border-black"><div class="bg-[#d97018] px-2 py-1 font-bold flex justify-between"><span>Employer</span><span class="arabic">صاحب العمل</span></div><div class="p-2"><div class="flex justify-between"><span class="font-bold">ID</span><span>${reportData.employerId||"—"}</span><span class="arabic">رقم المنشأة</span></div><div class="mt-1 border p-1 text-center font-bold text-xs">${reportData.employer||"—"}</div></div></div></div>
                        <div class="space-y-3"><div class="border border-black"><div class="bg-[#d97018] px-2 py-1 font-bold flex justify-between"><span>Personal Info</span><span class="arabic">البيانات الشخصية</span></div><div class="p-2 space-y-1"><div class="border p-1 text-center arabic font-bold">${reportData.nameAr||"—"}</div><div class="border p-1 text-center font-bold">${reportData.nameEn||"—"}</div><div class="flex justify-between"><span class="font-bold">Iqama No.</span><span>${reportData.iqama||"—"}</span><span class="arabic">رقم الإقامة</span></div><div class="flex justify-between"><span class="font-bold">Occupation</span><span class="arabic">${reportData.job||"—"}</span><span class="arabic">المهنة</span></div><div class="flex justify-between"><span class="font-bold">Nationality</span><span class="arabic">${reportData.nationality||"—"}</span><span class="arabic">الجنسية</span></div><div class="flex justify-between"><span class="font-bold">DOB</span><span>${reportData.dob||"—"}</span><span class="arabic">تاريخ الميلاد</span></div><div class="mt-2 p-1 text-center font-bold ${reportData.status==='Inactive'?'text-red-700':'text-green-700'}">${reportData.status==="Inactive"?"INACTIVE / غير ساري":"ACTIVE / ساري"}</div></div></div></div>
                    </div>
                    <div class="absolute bottom-4 left-0 right-0 text-center text-[8px] arabic border-t pt-2 mt-4">مدة صلاحية السجل 7 أيام – يمكن التحقق عبر مسح الرمز – المديرية العامة للجوازات<br><span class="text-[6px]">Shaon Venture Tech Systems | Secure Cloud Verified</span></div>
                </div>
            </div>
        `;
        document.getElementById("app").innerHTML = html;
        if (!isViewer) {
            document.getElementById("backBtn")?.addEventListener("click", () => { viewMode = "form"; renderForm(); });
            document.getElementById("downloadPdfBtn")?.addEventListener("click", async () => {
                const btn = document.getElementById("downloadPdfBtn");
                btn.innerText = "⏳ Generating...";
                try {
                    await html2pdf().set({ margin: 0, filename: `Muqeem_${reportData.ref}.pdf`, image: { type: 'jpeg', quality: 1 }, html2canvas: { scale: 3, useCORS: true }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } }).from(document.getElementById("a4Container")).save();
                } catch(e) { showToast("PDF error", "error"); }
                btn.innerText = "📥 PDF";
            });
        }
    }

    function escapeHtml(str) { return String(str).replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

    // Start app
    const app = initializeApp(FIREBASE_CONFIG);
    const auth = getAuth(app);
    const db = getFirestore(app);
    await signInAnonymously(auth);
    const urlParams = new URLSearchParams(window.location.search);
    const viewId = urlParams.get("view");
    if (viewId) await loadReportFromId(viewId);
    else renderForm();
</script>
</body>
</html>
