        body { background-color: #333; font-family: 'Arial', sans-serif; }
        #a4-container { width: 210mm; min-height: 297mm; background-color: #eff3f7; margin: 20px auto; box-shadow: 0 0 15px rgba(0,0,0,0.5); padding: 10mm; box-sizing: border-box; position: relative; }

        input { background: transparent; border: 1px solid transparent; text-align: center; font-weight: bold; color: #000; outline: none; width: 100%; transition: border 0.2s; }
        input:focus { border-bottom: 1px dashed #3b82f6; }
        .header-bg { background-color: #d97018; border: 1px solid #000; color: #000; }
        @media print { body { background: #eff3f7; } #a4-container { box-shadow: none; margin: 0; width: 100%; min-height: 100vh; padding: 10mm; } .no-print { display: none !important; } }
        .secure-pdf { -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none; }
        .ocr-progress { width: 100%; height: 4px; background: #ddd; border-radius: 2px; overflow: hidden; margin: 5px 0; }
        .ocr-progress-bar { height: 100%; width: 0%; background: #10b981; transition: width 0.3s; }
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 12px 24px; border-radius: 8px; z-index: 9999; }
    </style>
</head>

        </label>
        <button onclick="generateAndUpload()" class="bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-6 rounded">Generate & Upload to Cloudinary</button>
        <div id="ocrStatus" class="text-xs text-white bg-gray-700 p-1 rounded hidden"></div>
